name: GRC Asset Collection

on:
  schedule:
    - cron: '0 2 * * *' # Täglich um 02:00 Uhr
  workflow_dispatch: # Manuelle Ausführung ermöglichen

# Top-level permissions required for secrets: inherit to propagate to workflow_call jobs
permissions:
  contents: write

jobs:
  collect-assets:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up PowerShell modules
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        
        # Try to register standard PSGallery if broken
        try {
            if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
                Register-PSRepository -Default -ErrorAction SilentlyContinue
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
        } catch {}

        # Install modules with retry logic and fallback
        $modules = @("Microsoft.Graph.Authentication", "Microsoft.Graph.Applications", "ExchangeOnlineManagement")
        foreach ($module in $modules) {
            Write-Host "Installing module: $module"
            $retryCount = 0
            $success = $false
            while (-not $success -and $retryCount -lt 3) {
                try {
                    Install-Module -Name $module -Force -Scope CurrentUser -AllowClobber -ErrorAction Stop
                    $success = $true
                } catch {
                    $retryCount++
                    Write-Warning "Failed to install $module (Attempt $retryCount/3): $_"
                    if ($retryCount -lt 3) { Start-Sleep -Seconds 5 }
                }
            }
            if (-not $success) {
                if (Get-Module -ListAvailable -Name $module) {
                    Write-Host "$module is already pre-installed, continuing..."
                } else {
                    throw "Failed to install module $module after 3 attempts."
                }
            }
        }

    - name: Execute GRC Collectors
      shell: pwsh
      env:
        GRC_TENANT_ID: ${{ secrets.GRC_TENANT_ID }}
        GRC_CLIENT_ID: ${{ secrets.GRC_CLIENT_ID }}
        GRC_CERTIFICATE: ${{ secrets.GRC_CERTIFICATE }}
      run: |
        $ErrorActionPreference = 'Stop'
        
        Write-Host "Starting GRC Asset Collection in Cloud Mode..." -ForegroundColor Cyan
        
        # 1. Tenant Info
        Write-Host "Running Tenant Info Collector..." -ForegroundColor Yellow
        cd services/EntraID/Users/powershell
        ./Get-TenantInfo.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        
        # 2. Users Summary & Full Details
        Write-Host "Running User Summary Collector..." -ForegroundColor Yellow
        ./Get-UserSummary.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        Write-Host "Running User Full Details Collector..." -ForegroundColor Yellow
        ./Get-UserFullDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        
        # 3. Groups Summary & Full Details
        Write-Host "Running Group Summary Collector..." -ForegroundColor Yellow
        cd ../../Groups/powershell
        ./Get-GroupSummary.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        Write-Host "Running Group Full Details Collector..." -ForegroundColor Yellow
        ./Get-GroupFullDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        
        # 4. Entra Devices
        Write-Host "Running Entra ID Devices Collector..." -ForegroundColor Yellow
        cd ../../../Devices/EntraID-Devices/powershell
        ./Get-EntraDevices.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        
        # 5. Intune Devices
        Write-Host "Running Intune Managed Devices Collector..." -ForegroundColor Yellow
        cd ../../Intune-Devices/powershell
        ./Get-IntuneDevices.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # 6. Defender Devices & Combined Device Full Details
        Write-Host "Running Defender Endpoint Collector..." -ForegroundColor Yellow
        cd ../../Defender-Devices/powershell
        ./Get-DefenderDevices.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        Write-Host "Running Device Full Details Collector..." -ForegroundColor Yellow
        cd ../../powershell
        ./Get-DeviceFullDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # 7. Exchange Online Summary & Full Details
        Write-Host "Running Exchange Online Summary Collector..." -ForegroundColor Yellow
        cd ../../ExchangeOnline/powershell
        ./Get-ExchangeSummary.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        Write-Host "Running Exchange Online Full Details Collector..." -ForegroundColor Yellow
        ./Get-ExchangeFullDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # 8. SharePoint Online Summary & Full Details
        Write-Host "Running SharePoint Online Summary Collector..." -ForegroundColor Yellow
        cd ../../SharePoint/powershell
        ./Get-SharePointSummary.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        Write-Host "Running SharePoint Online Full Details Collector..." -ForegroundColor Yellow
        ./Get-SharePointFullDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # 9. Microsoft Teams Summary & Full Details
        Write-Host "Running Microsoft Teams Summary Collector..." -ForegroundColor Yellow
        cd ../../Teams/powershell
        ./Get-TeamsSummary.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE
        Write-Host "Running Microsoft Teams Full Details Collector..." -ForegroundColor Yellow
        ./Get-TeamsFullDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # 10. Entra ID Governance
        Write-Host "Running Entra ID Governance Summary Collector..." -ForegroundColor Yellow
        cd ../../EntraID/Governance/powershell
        ./Get-EntraGovernanceSummary.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # 11. Security Score & Recommendations
        Write-Host "Running Security Score & Recommendations Collector..." -ForegroundColor Yellow
        cd ../../../SecurityScore/powershell
        ./Get-SecurityScoreDetails.ps1 -TenantId $env:GRC_TENANT_ID -ClientId $env:GRC_CLIENT_ID -CertificateBase64 $env:GRC_CERTIFICATE

        # NOTE: Purview (DLP + Retention Labels) runs in a separate Windows job.
        # See: .github/workflows/purview-collection.yml

    - name: Commit and Push Asset exports
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin ${{ github.ref_name }}
        git add -f exports/EntraID/ exports/Devices/ exports/ExchangeOnline/ exports/SharePoint/ exports/Teams/ exports/SecurityScore/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Asset exports [skip ci]" && git push)


  # Purview runs on windows-latest (required for CSP-certificate + IPPS thumbprint auth)
  collect-purview:
    name: Collect Purview (Windows)
    uses: ./.github/workflows/purview-collection.yml
    secrets: inherit

  # Report generation waits for both collection jobs
  generate-report:
    name: Generate HTML GRC Report
    runs-on: ubuntu-latest
    needs: [collect-assets, collect-purview]
    if: always()
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Pull latest commits from all collection jobs
      # Both collect-assets and collect-purview commit exports/ independently.
      # We must git pull here to get ALL their commits before generating the report.
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin ${{ github.ref_name }}

    - name: Generate HTML GRC Report
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        # Generate the report using the collected json data
        cd common
        ./Generate-GRCReport.ps1

    - name: Commit and Push GRC Reports
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f exports/ docs/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update GRC Audit report [skip ci]" && git push)

    - name: Upload Collected Assets
      uses: actions/upload-artifact@v4
      with:
        name: grc-collected-assets
        path: exports/
        retention-days: 7
